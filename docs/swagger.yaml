basePath: /
definitions:
  httpadapter.VideoResponseBody:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      publisherID:
        type: string
      topic:
        type: string
    type: object
  httpadapter.createVideoRequestBody:
    properties:
      description:
        type: string
      topic:
        type: string
    type: object
  httpadp.authResponse:
    properties:
      token:
        type: string
    type: object
  httpadp.createUserRequest:
    properties:
      email:
        type: string
      lastname:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  httpadp.loginUserRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 50
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  httpadp.serviceErrorResponse:
    properties:
      code:
        type: string
      payload: {}
    type: object
host: localhost:8081
info:
  contact: {}
  description: Service for managing users.
  title: User Service API
  version: "1.0"
paths:
  /api/videos:
    get:
      description: Returns all videos with mock data for frontend
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get all videos
      tags:
      - videos
  /api/videos/{id}:
    get:
      description: Returns a single video by ID with mock data for frontend
      parameters:
      - description: Video ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get video by ID
      tags:
      - videos
  /v1/users:
    post:
      consumes:
      - application/json
      description: Create a new user and return the created user's ID. Example ID
      parameters:
      - description: Create user payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/httpadp.createUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'created user id (example: 123e4567-e89b-12d3-a456-426614174000)'
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: Create a new user
      tags:
      - Users
  /v1/users/{id}:
    get:
      description: Retrieve user details by ID. The ID can be provided as a
      parameters:
      - description: 'User ID (example: 123e4567-e89b-12d3-a456-426614174000)'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: Get user by ID
      tags:
      - Users
  /v1/users/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: Login user payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/httpadp.loginUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpadp.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: User login
      tags:
      - Users
  /v1/videos/{videoID}:
    get:
      description: Returns details of a single video by its unique identifier
      parameters:
      - description: video ID (UUID)
        in: path
        name: videoID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpadapter.VideoResponseBody'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get video by ID
      tags:
      - videos
  /v1/videos/pub/{publisherID}:
    get:
      description: Returns a list of videos for a specific publisher with pagination
        and search support
      parameters:
      - description: publisher ID (UUID)
        in: path
        name: publisherID
        required: true
        type: string
      - description: Search query
        in: query
        name: query
        type: string
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpadapter.VideoResponseBody'
            type: array
      summary: Get videos by publisher
      tags:
      - videos
    post:
      consumes:
      - application/json
      description: Creates a new video record for the specified publisher
      parameters:
      - description: publisher ID (UUID)
        in: path
        name: publisherID
        required: true
        type: string
      - description: Video creation request body
        in: body
        name: video
        required: true
        schema:
          $ref: '#/definitions/httpadapter.createVideoRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid input
          schema:
            type: string
        "500":
          description: Internal error
          schema:
            type: string
      summary: 'Creates new video. Publisher id example: d9fa522f-0006-464f-8d68-356ba1d6ad7d'
      tags:
      - videos
  /v1/videos/search:
    get:
      description: Search videos in the entire database by a keyword
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpadapter.VideoResponseBody'
            type: array
      summary: Global search
      tags:
      - videos
swagger: "2.0"
