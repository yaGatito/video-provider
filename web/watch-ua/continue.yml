name: PezdyukSupport
version: 0.0.1
schema: v1
#TODO: provide more context options
context:
  - provider: repo-map
    params:
      includeSignatures: false 
  - provider: tree
  - provider: open
models:
  - name: nomic embed text
    provider: ollama
    model: nomic-embed-text:latest
    roles: [embed]

  - name: Llama 3.1 8b 4KM
    provider: ollama
    model: llama3.1:8b-instruct-q4_K_M
    roles: [apply, chat, edit]
    capabilities: [tool_use]

  - name: Deepseek V2 16b
    provider: ollama
    model: deepseek-coder-v2:16b
    roles: [apply, chat, edit]

  - name: Qwen 2.5 7B
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M
    roles: [apply, edit, autocomplete]
    capabilities: [tool_use]
    promptTemplates:
      autocomplete: |
        `
        globalThis.importantFunc = importantFunc
        <|fim_prefix|>{{{prefix}}}<|fim_suffix|>{{{suffix}}}<|fim_middle|>
        `

  - name: Qwen 3 14b  
    provider: ollama
    model: qwen3:14b 
    roles: [apply, chat, edit]
    capabilities: [tool_use]

