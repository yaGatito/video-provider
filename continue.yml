name: Pezdyuk-Ultimate-Agent
version: 1.0.0
schema: v1

context:
  - provider: diff
  - provider: file
  - provider: code
  # - provider: repo-map
  #   params:
  #     includeSignatures: false 
  # - provider: tree
  # - provider: open

rules:
  - Golang backend + React Typescript Frontend
  - Video-service folder C:/Users/jlazo/GolandProjects/video-provider/internal/video-service
  - User-service folder C:/Users/jlazo/GolandProjects/video-provider/internal/video-service
  - React Frontend folder C:/Users/jlazo/GolandProjects/video-provider/web/watch-ua
  - If chat - give concise and short responses, no water

prompts:
  - name: test
    description: Unit test a function
    prompt: |
      Please write a complete suite of unit tests for this function. You should use the Jest testing framework.
      The tests should cover all possible edge cases and should be as thorough as possible.
      You should also include a description of each test case.

mcpServers:
  - name: filesystem
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:/Users/jlazo/GolandProjects/video-provider"

  - name: server-memory
    command: npx
    args: 
      - "-y"
      - "@modelcontextprotocol/server-memory"
    env: 
      MEMORY_FILE_PATH: "C:/Users/jlazo/AI/memory.jsonl"

  - name: fetch-server
    command: "docker"
    args: ["run", "-i", "--rm", "mcp/fetch"]

