services:
  # --- Video Service ---
  video-service:
    image: yagatito/video-service-prod:1.0
    container_name: video-service-alpine
    ports:
      - "${VIDEO_API_PORT}:8080"
    depends_on:
      - video-db
    environment:
      VIDEO_API_PORT: "8080"
      VIDEO_DB_NAME: "${VIDEO_DB_NAME}"
      VIDEO_DB_HOST: "video-db"
      VIDEO_DB_PORT: "5432"
      VIDEO_DB_USER: "${VIDEO_DB_USER}"
      VIDEO_DB_PASS: "${VIDEO_DB_PASS}"
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - app-network

  # --- Video DB (PostgreSQL) ---
  video-db:
    image: postgres:18-alpine
    container_name: video-db-postgres-18-alpine
    ports:
      - "${VIDEO_DB_PORT}:5432"
    environment:
      POSTGRES_USER: "${VIDEO_DB_USER}"
      POSTGRES_PASSWORD: "${VIDEO_DB_PASS}"
      POSTGRES_DB: "${VIDEO_DB_NAME}"
    volumes:
      - video-db-data:/var/lib/postgresql
    networks:
      - app-network

  # --- User Service ---
  user-service:
    image: yagatito/user-service-prod:1.0
    container_name: user-service-alpine
    ports:
      - "${USER_API_PORT}:8080"
    depends_on:
      - user-db
    environment:
      USER_API_PORT: "8080"
      USER_DB_NAME: "${USER_DB_NAME}"
      USER_DB_HOST: "user-db"
      USER_DB_PORT: "5432"
      USER_DB_USER: "${USER_DB_USER}"
      USER_DB_PASS: "${USER_DB_PASS}"
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - app-network

  # --- User DB (PostgreSQL) ---
  user-db:
    image: postgres:18-alpine
    container_name: user-db-postgres-18-alpine
    ports:
      - "${USER_DB_PORT}:5432"
    environment:
      POSTGRES_USER: "${USER_DB_USER}"
      POSTGRES_PASSWORD: "${USER_DB_PASS}"
      POSTGRES_DB: "${USER_DB_NAME}"
    volumes:
      - user-db-data:/var/lib/postgresql
    networks:
      - app-network

  # --- Web (React) Service ---
  web:
    image: yagatito/video-provider-web
    container_name: web-nginx
    environment:
        REACT_APP_VIDEO_API_URL: "${REACT_APP_VIDEO_API_URL}"
        REACT_APP_USER_API_URL: "${REACT_APP_USER_API_URL}"
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - video-service
    networks:
      - app-network

# --- Migration runner service ---
  migration_runner:
    image: yagatito/goose-go:1.0
    container_name: migration_runner
    volumes:
      - ./internal/video-service/adapters/postgres/sql/migrations:/video-migrations
      - ./internal/user-service/adapters/postgres/sql/migrations:/user-migrations
    environment:
      USER_DB_NAME: "${USER_DB_NAME}"
      USER_DB_HOST: "user-db"
      USER_DB_PORT: "5432"
      USER_DB_USER: "${USER_DB_USER}"
      USER_DB_PASS: "${USER_DB_PASS}"
      VIDEO_DB_NAME: "${VIDEO_DB_NAME}"
      VIDEO_DB_HOST: "video-db"
      VIDEO_DB_PORT: "5432"
      VIDEO_DB_USER: "${VIDEO_DB_USER}"
      VIDEO_DB_PASS: "${VIDEO_DB_PASS}"
    depends_on:
      - web
    networks:
      - app-network

volumes:
  user-db-data:
  video-db-data:

networks:
  app-network:
    driver: bridge
