version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/postgres/sql/query.sql"
    schema: "internal/adapters/postgres/sql/migrations"
    gen:
      go:
        out: "internal/adapters/postgres/db"
        package: "postgres"
        sql_package: "pgx/v5"
        # TODO: remove line below after dev-phase
        emit_interface: true
        emit_prepared_queries: true
        emit_json_tags: false
        overrides:
        - db_type: "uuid"
          go_type:
            import: "github.com/google/uuid"
            type: "UUID"
