basePath: /
definitions:
  httpadp.authResponse:
    properties:
      token:
        type: string
    type: object
  httpadp.createUserRequest:
    properties:
      email:
        type: string
      lastname:
        type: string
      name:
        type: string
      password:
        type: string
    required:
    - email
    - lastname
    - name
    - password
    type: object
  httpadp.loginUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  httpadp.serviceErrorResponse:
    properties:
      msg:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: Service for managing users.
  title: User Service API
  version: "1.0"
paths:
  /v1/users:
    post:
      consumes:
      - application/json
      description: Creates a new user and return the created user's ID. Example ID
      parameters:
      - description: CreateUser user payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/httpadp.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'created user id (example: 123e4567-e89b-12d3-a456-426614174000)'
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: Creates a new user
      tags:
      - Users
  /v1/users/{id}:
    get:
      description: Retrieve user details by ID. The ID can be provided as a
      parameters:
      - description: JWT token for authentication (e.g., Bearer <token>)
        in: header
        name: Authorization
        required: true
        type: string
      - description: 'User ID (example: 123e4567-e89b-12d3-a456-426614174000)'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: Get user by ID
      tags:
      - Users
  /v1/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: Login user payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/httpadp.loginUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpadp.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadp.serviceErrorResponse'
      summary: User login
      tags:
      - Users
swagger: "2.0"
