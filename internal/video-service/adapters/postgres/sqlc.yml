version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/query.sql"
    schema: "sql/migrations"
    gen:
      go:
        out: "db"
        package: "postgres"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_prepared_queries: true
        emit_json_tags: false
        overrides:
        - db_type: "uuid"
          go_type:
            import: "github.com/google/uuid"
            type: "UUID"
