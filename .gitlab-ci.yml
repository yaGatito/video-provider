stages:
  - lint
  - test
  - build
  - deploy
  - migrate-up

default:
  tags:
    - orange-pi-5-4gb-docker-runner 

lint:
  image: docker.io/jnikko/golangci-go:1.0
  script:
    - cd internal
    - golangci-lint run -c ../.golangci.yml

test:
  image: golang:1.25-alpine
  script:
    - cd internal
    - go test ./...

build:
  image: docker:27-cli
  script:
    - docker compose build

deploy:
  stage: deploy
  image: jnikko/ssh:1.0
  when: on_success
  script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod -R 600 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" | base64 -d >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'docker compose up -d'

migrate-up:
  stage: migrate-up
  image: docker:27-cli
  when: manual
  script:
    - |
      docker compose run --rm migration_runner sh -c 'goose -dir /user-migrations postgres \
      "postgres://$USER_DB_USER:$USER_DB_PASS@$USER_DB_HOST:$USER_DB_PORT/$USER_DB_NAME?sslmode=disable" up'
    - |
      docker compose run --rm migration_runner sh -c 'goose -dir /video-migrations postgres \
      "postgres://$VIDEO_DB_USER:$VIDEO_DB_PASS@$VIDEO_DB_HOST:$VIDEO_DB_PORT/$VIDEO_DB_NAME?sslmode=disable" up'
