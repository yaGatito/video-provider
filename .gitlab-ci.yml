stages:
  - lint
  - generate
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2

test:
  stage: test
  image: golang:1.25

  script:
    - echo "testing..."
    - make tests

# lint:
#   stage: lint
#   image: golangci/golangci-lint:latest

#   script:
#     - echo "linting..."
#     - make lint 

generate:
  stage: generate
  image: golang:1.25

  before_script:
    - echo "downloading tools..."
    - make go-tools

  script:
    - make gen config=user
    - make gen config=video

build:
  stage: build

  script:
    - echo "building..."
    - docker compose build

deploy:
  stage: deploy

  script:
    - echo "deploying..."
    - docker compose down
    - docker compose up -d
    # - dummy change