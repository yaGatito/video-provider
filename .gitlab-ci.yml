stages:
  - lint
  - generate
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2

test:
  stage: test
  image: golang:1.25-alpine

  script:
    - echo "testing..."
    - cd internal
    - go test ./...

