stages:
  - lint
  - test
  - build
  - buildx
  - deploy
  - migrate-up

default:
  tags:
    - orange-pi-5-4gb-docker-runner 

lint:
  image: docker.io/yagatito/golangci-go:1.0
  script:
    - cd internal
    - golangci-lint run -c ../.golangci.yml

test:
  image: golang:1.25-alpine
  script:
    - cd internal
    - go test ./...

buildx:
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    # Setup
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --name mybuilder --driver docker-container --use
    - docker buildx inspect --bootstrap

    # Build
    - docker buildx build -f internal/Dockerfile.user.prod  --platform linux/amd64,linux/arm64 -t yagatito/user-service-prod:1.0  --push ./internal
    - docker buildx build -f internal/Dockerfile.video.prod --platform linux/amd64,linux/arm64 -t yagatito/video-service-prod:1.0 --push ./internal
    - docker buildx build -f web/Dockerfile                 --platform linux/amd64,linux/arm64 -t yagatito/video-provider-web:1.0 --push ./web

deploy:
  stage: deploy
  image: docker.io/yagatito/ssh:1.0
  when: on_success
  script:
    # Setting up SSH
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod -R 600 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" | base64 -d >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

    # Setting up docker compose
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'mkdir -p /app'
    - |
      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cat << 'EOF' > /app/.env
      VIDEO_API_PORT=$VIDEO_API_PORT
      VIDEO_DB_NAME=$VIDEO_DB_NAME
      VIDEO_DB_USER=$VIDEO_DB_USER
      VIDEO_DB_PASS=$VIDEO_DB_PASS
      JWT_SECRET=$JWT_SECRET
      VIDEO_DB_PORT=$VIDEO_DB_PORT
      USER_DB_USER=$USER_DB_USER
      USER_DB_PASS=$USER_DB_PASS
      USER_DB_NAME=$USER_DB_NAME
      USER_API_PORT=$USER_API_PORT
      USER_DB_PORT=$USER_DB_PORT
      REACT_APP_VIDEO_API_URL=$REACT_APP_VIDEO_API_URL
      REACT_APP_USER_API_URL=$REACT_APP_USER_API_URL
      EOF"
    - scp docker-compose.yml $SSH_USER@$SSH_HOST:/app/docker-compose.yml

    # Setting up migrations
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'mkdir -p /app/video-migrations'
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'mkdir -p /app/user-migrations'
    - scp -r -P $SSH_PORT internal/video-service/adapters/postgres/sql/migrations/* $SSH_USER@$SSH_HOST:/app/video-migrations/
    - scp -r -P $SSH_PORT internal/user-service/adapters/postgres/sql/migrations/* $SSH_USER@$SSH_HOST:/app/user-migrations/

    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'cd /app && docker compose up -d'

# refactor it so it will run a separate image for it and not reusing container
migrate-up:
  stage: migrate-up
  image: docker:27-cli
  script:
    - |
      docker compose run --rm migration_runner sh -c 'goose -dir /user-migrations postgres \
      "postgres://$USER_DB_USER:$USER_DB_PASS@$USER_DB_HOST:$USER_DB_PORT/$USER_DB_NAME?sslmode=disable" up'
    - |
      docker compose run --rm migration_runner sh -c 'goose -dir /video-migrations postgres \
      "postgres://$VIDEO_DB_USER:$VIDEO_DB_PASS@$VIDEO_DB_HOST:$VIDEO_DB_PORT/$VIDEO_DB_NAME?sslmode=disable" up'
