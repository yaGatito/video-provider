stages:
  - lint
  - test
  - build
  - buildx
  - deploy
  - migrate-up

default:
  tags:
    - orange-pi-5-4gb-docker-runner 

lint:
  image: docker.io/yagatito/golangci-go:1.0
  script:
    - cd internal
    - golangci-lint run -c ../.golangci.yml

test:
  image: golang:1.25-alpine
  script:
    - cd internal
    - go test ./...

buildx:
  image: docker:27-cli
  services:
    - docker:27-dind # Make sure the DinD service is running if it isn't configured globally
  script:
    # 1. Install cross-platform QEMU emulator binaries into the kernel
    - docker run --privileged --rm tonistiigi/binfmt --install all
    
    # 2. Create a new multi-platform builder instance using the docker-container driver
    - docker buildx create --name mybuilder --driver docker-container --use
    
    # 3. Bootstrap/Start the custom builder instance
    - docker buildx inspect --bootstrap
    
    # 4. Execute your build (it will now correctly route ARM64 and AMD64 tasks)
    - docker buildx build -f internal/Dockerfile.user.prod  --platform linux/amd64,linux/arm64 -t yagatito/user-service-prod:1.0  --push ./internal
    - docker buildx build -f internal/Dockerfile.video.prod --platform linux/amd64,linux/arm64 -t yagatito/video-service-prod:1.0 --push ./internal
    - docker buildx build -f web/Dockerfile                 --platform linux/amd64,linux/arm64 -t yagatito/video-provider-web:1.0 --push ./web

build:
  image: docker:27-cli
  script:
    - docker compose build

deploy:
  stage: deploy
  image: docker.io/yagatito/ssh:1.0
  when: on_success
  script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod -R 600 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" | base64 -d >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'mkdir -p ~/app'
    - scp docker-compose.yml $SSH_USER@$SSH_HOST:~/app/docker-compose.yml
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST 'docker compose up -d'
    # - scp -r internal/video-service/adapters/postgres/sql/migrations/* $SSH_USER@$SSH_HOST:/video-migrations/
    # - scp -r internal/user-service/adapters/postgres/sql/migrations/* $SSH_USER@$SSH_HOST:/user-migrations/

