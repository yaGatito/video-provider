stages:
  - lint
  - test
  - generate
  - build
  - deploy

default:
  tags:
    - orange-pi-5-4gb

test:
  stage: test
  image: golang:1.25-alpine

  script:
    - echo "testing..."
    - cd internal
    - go test ./...

lint:
  stage: lint

  script:
    - echo "linting..."
    - golangci-lint run

  before_script:
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

generate:
  stage: generate
  image: golang:1.25-alpine

  before_script:
    - echo "generating..."
    - go install github.com/golang/mock/mockgen@v1.6.0
    - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.0
    - go install github.com/swaggo/swag/cmd/swag@v1.16.6

  script:
    - sqlc generate
    - swag init
    - mockgen ...

build:
  stage: build

  script:
    - docker compose build

deploy:
  stage: deploy

  script:
    - docker compose up -d --build