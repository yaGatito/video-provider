stages:
  - lint
  - test
  - build
  - deploy
  - migrate-up

default:
  tags:
    - orange-pi-5-4gb-docker-runner 

lint:
  image: docker.io/jnikko/golangci-go:1.0
  script:
    - cd internal
    - golangci-lint run -c ../.golangci.yml

test:
  image: golang:1.25-alpine
  script:
    - cd internal
    - go test ./...

build:
  script:
    - echo "attempting to compose build"
    - docker compose build

deploy:
  stage: deploy
  when: on_success
  script:
    - docker compose up -d

