stages:  
  - test
  - build
  - deploy
  - v1-lint
  - v2-lint
  - v3-lint
  - migrate-up

default:
  tags:
    - orange-pi-5-4gb

build-lint-runner:
  when: manual
  script:
    - docker build -f Dockerfile.lint -t jnikko/golangci-go:1.0 .
    - docker push jnikko/golangci-go:1.0

v3-linter:
  when: manual
  script:
    - docker run --rm -v $(pwd):/app -w /app jnikko/golangci-go:1.0 sh -c "cd /app/internal && golangci-lint run -c /app/.golangci.yml"

v1-lint:
  script:
    - docker run --rm -v $(pwd):/app -w /app golang:1.25-alpine sh -c "go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 && cd /app/internal && golangci-lint run -c /app/.golangci.yml"

v2-lint:
  script:
    - docker build -f Dockerfile.lint -t linter-batman . && docker run --rm -v $(pwd):/app -w /app linter-batman sh -c "cd /app/internal && golangci-lint run -c /app/.golangci.yml"

test:
  script:
    - docker run --rm -v $(pwd)/internal:/app -w /app golang:1.25-alpine sh -c "go test ./..."

build:
  script:
    - docker compose build

deploy:
  stage: deploy
  when: on_success
  script:
    - docker compose up -d

migrate:
  stage: migrate-up

  script:
    - echo "make migrate-up config=user"
    - echo "make migrate-up config=video"
