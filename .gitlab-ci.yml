stages:
  - lint
  - test
  # - migrate
  - build
  - deploy

default:
  tags:
    - orange-pi-5-4gb

lint:
  script:
    - docker run --rm -v $(pwd)/internal:/app -w /app golang:1.25-alpine sh -c "go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 && cd ./internal/ && golangci-lint run -c ../.golangci.yml"

test:
  script:
    - docker run --rm -v $(pwd)/internal:/app -w /app golang:1.25-alpine sh -c "go test ./..."

# migrate:
#   stage: migrate

#   script:
#     - make migrate-up config=user
#     - make migrate-up config=video

build:
  script:
    - docker compose build

deploy:
  script:
    - docker compose up -d --build